microservice-chart:
  namespace: "mdc"
  nameOverride: ""
  fullnameOverride: ""

  # Formula: preStop(15s) + SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE(35s) + buffer(10s) = 60s
  # NOTA: in precedenza mancava completamente → il pod usava il default del chart (30s),
  # troppo basso per garantire lo shutdown applicativo completo
  terminationGracePeriodSeconds: 60

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  lifecycle:
    preStop:
      create: true
      command: ["/bin/sh", "-c", "sleep 15"]

  # BFF: startup più leggero (no Kafka), finestra ridotta a 100s: 10 + (18 × 5)
  startupProbe:
    create: true
    handlerType: httpGet
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    initialDelaySeconds: 10
    failureThreshold: 18
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 3
    terminationGracePeriodSeconds: 60

  livenessProbe:
    handlerType: httpGet
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    initialDelaySeconds: 0
    failureThreshold: 3
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
    terminationGracePeriodSeconds: 30

  readinessProbe:
    handlerType: httpGet
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    initialDelaySeconds: 0
    failureThreshold: 3
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 3

  deployment:
    create: true
    topologySpreadConstraints:
      create: true
      useDefaultConfiguration: true

  service:
    create: true
    type: ClusterIP
    ports:
      - 8080

  # BFF è esposto via ingress con path /emd-ar-backoffice-bff, raggiungibile dal browser.
  # L'host varia per ambiente ed è definito nei values.yaml specifici.
  ingress:
    create: true
    path: /emd-ar-backoffice-bff(/|$)(.*)
    rewriteTarget: /$2
    servicePort: 8080
    annotations: {
      nginx.ingress.kubernetes.io/satisfy: "any"
    }

  podAnnotations: {}

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 10000
    runAsGroup: 10000

  externalConfigMapFiles:
    create: true
    configMaps:
      - name: appinsights-config
        key: applicationinsights.json

  externalConfigMapValues:
    mdc-common:
      TZ: TZ
    rest-client:
      EMD_TPP: emd-tpp-baseurl


  envSecret:
    MONGODB_URI: mongodb-connection-string
    APPLICATIONINSIGHTS_CONNECTION_STRING: appinsights-instrumentation-key

  tmpVolumeMount:
    create: true
    mounts:
      - name: tmp
        mountPath: /tmp
      - name: logs
        mountPath: /app/logs

  nodeSelector: {}

  tolerations:
    - key: "mdcOnly"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: domain
                operator: In
                values:
                  - mdc

  canaryDelivery:
    create: false
    ingress:
      header: true
      headerName: X-Canary
      headerValue: canary
      weightPercent: 10
    image:
      repository: ghcr.io/pagopa/emd-ar-backoffice-bff
      tag: <HOT_FIX_IMAGE_HERE>
    envSecret: {}
    envConfig: {}
