microservice-chart:
  namespace: "mdc"
  nameOverride: ""
  fullnameOverride: ""

  # nginx starts quickly — use shorter delays than Java services
  livenessProbe:
    handlerType: httpGet
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 15
    failureThreshold: 5
    periodSeconds: 10

  readinessProbe:
    handlerType: httpGet
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 5
    failureThreshold: 5
    periodSeconds: 10

  deployment:
    create: true
    topologySpreadConstraints:
      create: true
      useDefaultConfiguration: true

  service:
    create: true
    type: ClusterIP
    ports:
      - 8080

  ingress:
    create: true
    path: /emd-ar-backoffice-fe(/|$)(.*)
    rewriteTarget: /$2
    servicePort: 8080
    annotations: {
      nginx.ingress.kubernetes.io/satisfy: "any"
    }

  podAnnotations: {}

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 10000
    runAsGroup: 10000

  # API_BASE_URL è l'URL pubblico del BFF, varia per ambiente.
  # Va definita nei values.yaml di ciascun ambiente (dev/uat/prod).

  tmpVolumeMount:
    create: true
    mounts:
      - name: tmp
        mountPath: /tmp
      - name: cache
        mountPath: /var/cache/nginx
      - name: run
        mountPath: /var/run

  nodeSelector: {}

  tolerations:
    - key: "mdcOnly"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: domain
                operator: In
                values:
                  - mdc

  canaryDelivery:
    create: false
    ingress:
      header: true
      headerName: X-Canary
      headerValue: canary
      weightPercent: 10
    image:
      repository: ghcr.io/pagopa/emd-ar-backoffice-fe
      tag: <HOT_FIX_IMAGE_HERE>
    envSecret: {}
    envConfig: {}
