microservice-chart:
  image:
    repository: ghcr.io/pagopa/emd-ar-backoffice-fe
    tag: latest
    pullPolicy: Always

  ingress:
    host: "mdc.itn.internal.cstar.pagopa.it"

  envConfig:
    API_BASE_URL: "https://mdc.itn.internal.cstar.pagopa.it/emd-ar-backoffice-bff"

  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  autoscaling:
    enable: true
    minReplica: 1
    maxReplica: 2

