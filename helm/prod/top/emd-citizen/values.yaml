microservice-chart:
  image:
    repository: ghcr.io/pagopa/emd-citizen
    tag: v1.1.2
    pullPolicy: Always

  ingress:
    host: "mdc.itn.internal.cstar.pagopa.it"

  resources:
    requests:
      # cpu 200m (era 150m): ratio burst 3:1 vs limit 600m → meno throttling quando i pod
      # sopravvissuti assorbono il picco durante il rolling update (95 req/s cadauno a 190 req/s totali)
      # memory 896Mi (era 768Mi): heap JVM ~1306Mi + AppInsights agent off-heap ~100Mi +
      # Netty buffers + metaspace ≈ 400Mi overhead → 896Mi request segnala il working set reale
      memory: "896Mi"
      cpu: "200m"
    limits:
      memory: "1536Mi"
      cpu: "600m"

  autoscaling:
    enable: true
    minReplica: 2
    maxReplica: 4
    pollingInterval: 30 # seconds
    cooldownPeriod: 300 # seconds
    triggers:
      - type: cpu
        metadata:
          type: Utilization
          value: "60"

  podDisruptionBudget:
    create: true
    maxUnavailable: 1

  envConfig:
    MONGODB_DBNAME: mdc
    SERVER_SHUTDOWN: "graceful"
    # 35s = nginx/AGIC propagation lag (15s, coperto dal preStop) + max WebClient timeout (15s) + buffer (5s)
    # Garantisce che Spring dreni tutte le richieste in volo prima di terminare
    SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: "35s"
    APPLICATIONINSIGHTS_ROLE_NAME: "emdcitizen"
    APPLICATIONINSIGHTS_INSTRUMENTATION_LOGGING_LEVEL: "INFO"
    APPLICATIONINSIGHTS_INSTRUMENTATION_MICROMETER_ENABLED: "false"
    APPLICATIONINSIGHTS_PREVIEW_PROFILER_ENABLED: "false"
    JAVA_TOOL_OPTIONS: >-
      -XX:InitialRAMPercentage=75.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:+UseContainerSupport
      -Djava.security.egd=file:/dev/./urandom
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=7
      -Dio.netty.eventLoopThreads=100
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json


  keyvault:
    name: "cstar-p-itn-mdc-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"
