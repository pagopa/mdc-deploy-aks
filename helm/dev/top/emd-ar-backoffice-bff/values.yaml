microservice-chart:
  image:
    repository: ghcr.io/pagopa/emd-ar-backoffice-bff
    tag: snapshot-MMC-556-get-pagopa-credentials
    pullPolicy: Always

  ingress:
    host: "mdc.itn.internal.dev.cstar.pagopa.it"

  envConfig:
    APPLICATIONINSIGHTS_ROLE_NAME: "emdarbackofficebff"
    APPLICATIONINSIGHTS_INSTRUMENTATION_LOGGING_LEVEL: "INFO"
    CORS_ALLOWED_ORIGINS: "https://mdc.dev.cstar.pagopa.it"
    APPLICATIONINSIGHTS_INSTRUMENTATION_MICROMETER_ENABLED: "false"
    APPLICATIONINSIGHTS_PREVIEW_PROFILER_ENABLED: "false"
    SERVER_SHUTDOWN: "graceful"
    SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: "35s"

    KEYCLOAK_REALM: "mdc"
    KEYCLOAK_IDP_ALIAS: "selfcare-dev-jwt-grant"

    SC_JWT_SET_URI: https://dev.selfcare.pagopa.it/.well-known/jwks.json
    SC_AUTH_EXPECTED_ISSUER: "https://dev.selfcare.pagopa.it"
    SC_AUTH_EXPECTED_AUDIENCE: "https://api-mcshared.dev.cstar.pagopa.it/auth-itn/realms/mdc"
    KEYCLOAK_TPP_GROUP_NAME: "emd-tpp"

    JAVA_TOOL_OPTIONS: >-
      -XX:InitialRAMPercentage=75.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:+UseContainerSupport
      -Djava.security.egd=file:/dev/./urandom
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=7
      -Dio.netty.eventLoopThreads=100
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json
      -agentlib:jdwp=transport=dt_socket,server=y,address=8001,suspend=n
      -Dcom.sun.management.jmxremote=true
      -Dcom.sun.management.jmxremote.port=3002
      -Dcom.sun.management.jmxremote.rmi.port=3003
      -Djava.rmi.server.hostname=127.0.0.1
      -Dcom.sun.management.jmxremote.authenticate=false
      -Dcom.sun.management.jmxremote.ssl=false


  envSecret:
    MY_KV_SECRET: cstar-d-itn-dev-aks-apiserver-url
    KEYCLOAK_AUTH_URL: keycloak-url
    KEYCLOAK_MANAGER_CLIENT_ID: ar-backoffice-admin-client-id
    KEYCLOAK_MANAGER_CLIENT_SECRET: ar-backoffice-admin-client-secret
    KEYCLOAK_BACKOFFICE_CLIENT_ID: ar-backoffice-client-id
    KEYCLOAK_BACKOFFICE_CLIENT_SECRET: ar-backoffice-client-secret


  keyvault:
    name: "cstar-d-itn-mdc-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"

  resources:
    requests:
      # BFF: traffico più basso e no Kafka → profilo leggero ma comunque elevato rispetto ai minimi
      memory: "640Mi"
      cpu: "150m"
    limits:
      memory: "1024Mi"
      cpu: "400m"

  autoscaling:
    enable: false
