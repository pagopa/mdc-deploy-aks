microservice-chart:
  image:
    repository: ghcr.io/pagopa/emd-tpp
    tag: v1.5.1@sha256:a2b7a8dbd3e944e61e1ea72bd11bac048caa715f872bd96a8e0ca0d60a68a66a
    pullPolicy: Always

  ingress:
    host: "mdc.itn.internal.cstar.pagopa.it"

  resources:
    requests:
      memory: "896Mi"
      cpu: "200m"
    limits:
      memory: "1536Mi"
      cpu: "600m"

  autoscaling:
    enable: true
    minReplica: 2
    maxReplica: 4
    pollingInterval: 30 # seconds
    cooldownPeriod: 300 # seconds
    triggers:
      - type: cpu
        metadata:
          type: Utilization
          value: "60"

  podDisruptionBudget:
    create: true
    maxUnavailable: 1

  envConfig:
    MONGODB_DBNAME: mdc
    SERVER_SHUTDOWN: "graceful"
    SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: "35s"
    APPLICATIONINSIGHTS_ROLE_NAME: "emdtpp"
    APPLICATIONINSIGHTS_INSTRUMENTATION_LOGGING_LEVEL: "INFO"
    APPLICATIONINSIGHTS_INSTRUMENTATION_MICROMETER_ENABLED: "false"
    APPLICATIONINSIGHTS_PREVIEW_PROFILER_ENABLED: "false"
    AZURE_KEYVAULT_URL: "https://cstar-p-itn-mdc-kv.vault.azure.net"
    JAVA_TOOL_OPTIONS: >-
      -XX:InitialRAMPercentage=75.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:+UseContainerSupport
      -Djava.security.egd=file:/dev/./urandom
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=7
      -Dio.netty.eventLoopThreads=100
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json

  envSecret:
    MY_KV_SECRET: cstar-p-itn-prod-aks-apiserver-url

  keyvault:
    name: "cstar-p-itn-mdc-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"
